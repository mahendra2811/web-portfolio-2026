<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Mahendra Singh Puniya</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0A0A0F; color: #F0F0F5; font-family: system-ui, sans-serif;
    }
    .card {
      background: rgba(255,255,255,0.06); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
      padding: 3rem; text-align: center; max-width: 400px; margin: 1rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #A0A0B8; margin-bottom: 1.5rem; }
    button {
      background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.3);
      color: white; padding: 0.75rem 1.5rem; border-radius: 12px;
      cursor: pointer; font-size: 1rem;
    }
    button:hover { background: rgba(99,102,241,0.3); }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Please check your connection and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
